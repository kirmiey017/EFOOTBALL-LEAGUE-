<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Efootball Festival League</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --obs-1: #030304; --obs-2: #0a0a0d; --obs-3: #131317;
    --glass: rgba(255,255,255,0.05); --glass-strong: rgba(255,255,255,0.09);
    --stroke: rgba(255,255,255,0.12); --stroke-soft: rgba(255,255,255,0.06);
    --ink: #f2f3f6; --ink-dim: rgba(242,243,246,0.56); --ink-faint: rgba(242,243,246,0.34);
    --sky: #6fc6ff; --gold: #f0c869; --rose: #f2657a;
  }
  *{ box-sizing: border-box; }
  html, body{
    margin:0; padding:0; min-height:100vh;
    background:
      radial-gradient(1100px 650px at 12% -8%, rgba(111,198,255,0.09), transparent 60%),
      radial-gradient(900px 600px at 105% 15%, rgba(240,200,105,0.045), transparent 55%),
      linear-gradient(165deg, var(--obs-1) 0%, var(--obs-2) 55%, var(--obs-3) 100%);
    font-family: 'Inter', sans-serif; color: var(--ink);
  }
  .wrap{ position:relative; z-index:1; max-width: 900px; margin: 0 auto; padding: 52px 20px 80px; }
  .eyebrow{
    font-family:'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 0.22em; text-transform: uppercase;
    color: var(--gold); display:flex; align-items:center; gap:10px; margin-bottom: 14px;
  }
  .eyebrow::before{ content:"🔒"; font-size:12px; }
  h1{ font-family: 'Oswald', sans-serif; font-weight: 600; font-size: clamp(24px, 5vw, 34px); margin: 0 0 6px; }
  h1 span{ color: var(--ink-dim); font-weight: 400; }
  .sub{ color: var(--ink-faint); font-size: 13.5px; margin: 0 0 28px; line-height:1.5; }

  .panel{
    position:relative; border-radius: 24px;
    background: linear-gradient(155deg, var(--glass-strong), var(--glass) 60%);
    border: 1px solid var(--stroke);
    backdrop-filter: blur(28px) saturate(180%); -webkit-backdrop-filter: blur(28px) saturate(180%);
    box-shadow: 0 1.5px 0 rgba(255,255,255,0.16) inset, 0 -1px 0 rgba(255,255,255,0.02) inset, 0 28px 70px -24px rgba(0,0,0,0.75);
    overflow: hidden; margin-bottom: 22px; padding: 26px 24px;
  }

  /* login screen */
  #loginScreen{ text-align:center; }
  #loginScreen .form-title{ font-family:'Oswald', sans-serif; font-size:17px; font-weight:600; margin: 0 0 18px; }
  #loginScreen input{
    width:100%; background: rgba(255,255,255,0.06); border: 1px solid var(--stroke-soft); border-radius: 12px;
    color: var(--ink); font-family:'JetBrains Mono', monospace; font-size: 13.5px; padding: 12px 14px;
    outline:none; margin-bottom: 12px;
  }
  #loginScreen input:focus{ border-color: rgba(111,198,255,0.5); }

  button{
    font-family:'Inter', sans-serif; font-weight:600; font-size: 13px; border-radius: 12px;
    border: 1px solid var(--stroke); padding: 11px 18px; cursor:pointer;
    transition: transform 0.15s ease, background 0.2s ease, border-color 0.2s ease;
  }
  button:active{ transform: scale(0.97); }
  .btn-primary{ width:100%; background: linear-gradient(155deg, rgba(111,198,255,0.32), rgba(111,198,255,0.14)); color: #eaf6ff; border-color: rgba(111,198,255,0.5); }
  .btn-primary:hover{ background: linear-gradient(155deg, rgba(111,198,255,0.42), rgba(111,198,255,0.2)); }
  .btn-ghost{ background: rgba(255,255,255,0.045); color: var(--ink-dim); }
  .btn-ghost:hover{ background: rgba(255,255,255,0.08); color: var(--ink); }

  .error-msg{ font-family:'JetBrains Mono', monospace; font-size: 11.5px; color: var(--rose); margin-top: 10px; min-height: 14px; }
  .status-msg{ font-family:'JetBrains Mono', monospace; font-size: 11.5px; color: var(--ink-faint); margin-top: 10px; min-height: 14px; }

  /* dashboard (after login) */
  #dashboard{ display:none; }
  #dashboard.show{ display:block; }
  .signed-in-row{ display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom:18px; flex-wrap:wrap; }
  .signed-in-tag{
    font-family:'JetBrains Mono', monospace; font-size: 11px; color: var(--sky);
    background: rgba(111,198,255,0.12); border: 1px solid rgba(111,198,255,0.3); padding: 6px 12px; border-radius: 999px;
  }
  .match-row{ display:grid; grid-template-columns: 1fr 56px auto 56px 1fr; gap: 10px; align-items:center; margin-bottom:16px; }
  select, input[type=number]{
    width:100%; background: rgba(255,255,255,0.06); border: 1px solid var(--stroke-soft); border-radius: 12px;
    color: var(--ink); font-family:'Inter', sans-serif; font-size: 13.5px; padding: 11px 10px; outline:none;
    appearance:none; -webkit-appearance:none;
  }
  select:focus, input[type=number]:focus{ border-color: rgba(111,198,255,0.55); background: rgba(255,255,255,0.09); }
  input[type=number]{ text-align:center; font-family:'JetBrains Mono', monospace; font-weight:600; }
  .vs{ text-align:center; font-family:'JetBrains Mono', monospace; font-size: 11px; color: var(--ink-faint); letter-spacing:0.1em; }
  .form-actions{ display:flex; gap:10px; flex-wrap:wrap; }

  .table{ width:100%; border-collapse: collapse; margin-top: 8px; }
  thead th{
    text-align:center; font-family:'JetBrains Mono', monospace; font-weight:500; font-size: 10.5px;
    letter-spacing:0.1em; text-transform:uppercase; color: var(--ink-faint); padding: 14px 8px;
    border-bottom: 1px solid var(--stroke-soft); white-space:nowrap;
  }
  thead th.team{ text-align:left; padding-left:12px; }
  thead th.pts{ color: var(--sky); }
  tbody td{ padding: 11px 8px; font-size: 13px; text-align:center; border-bottom: 1px solid var(--stroke-soft); }
  tbody td.team{ text-align:left; padding-left:12px; }
  tbody tr:last-child td{ border-bottom:none; }
  .pos-cell{ font-family:'JetBrains Mono', monospace; font-weight:600; color: var(--ink-dim); }
  .club{ display:flex; align-items:center; gap:10px; font-family:'Oswald', sans-serif; font-weight:500; font-size: 13.5px; }
  .crest{
    width: 24px; height:24px; flex-shrink:0; border-radius: 7px; display:flex; align-items:center; justify-content:center;
    font-family:'JetBrains Mono', monospace; font-size: 9px; font-weight:700; color: var(--ink);
    background: rgba(255,255,255,0.06); border: 1.5px solid var(--crest-color, rgba(255,255,255,0.2));
    box-shadow: 0 0 10px -2px var(--crest-color, transparent);
  }
  .pts-val{ font-family:'JetBrains Mono', monospace; font-weight:700; color: var(--sky); }
  .stat-val{ font-family:'JetBrains Mono', monospace; font-weight:500; color: var(--ink-dim); }
  .gd-pos{ color: var(--gold); } .gd-neg{ color: var(--rose); }

  @media (max-width: 680px){
    .wrap{ padding: 36px 12px 60px; }
    .match-row{ grid-template-columns: 1fr 1fr; }
    thead th, tbody td{ padding: 9px 5px; font-size: 11.5px; }
    th.hide-sm, td.hide-sm{ display:none; }
  }
</style>
</head>
<body>

<div class="wrap">
  <div class="eyebrow">Private · Admin only</div>
  <h1>League <span>Control Panel</span></h1>
  <p class="sub">Sign in to log results. This page is not linked from the public site — keep this URL to yourself.</p>

  <div class="panel" id="loginScreen">
    <p class="form-title">Admin sign-in</p>
    <input type="email" id="adminEmail" placeholder="Email" autocomplete="username">
    <input type="password" id="adminPassword" placeholder="Password" autocomplete="current-password">
    <button class="btn-primary" id="loginBtn">Sign in</button>
    <div class="error-msg" id="errorMsg"></div>
  </div>

  <div class="panel" id="dashboard">
    <div class="signed-in-row">
      <span class="signed-in-tag" id="signedInTag">Signed in</span>
      <button class="btn-ghost" id="logoutBtn">Log out</button>
    </div>

    <div class="match-row">
      <select id="homeTeam"></select>
      <input type="number" id="homeGoals" min="0" value="0" aria-label="Home goals">
      <span class="vs">VS</span>
      <input type="number" id="awayGoals" min="0" value="0" aria-label="Away goals">
      <select id="awayTeam"></select>
    </div>
    <div class="form-actions">
      <button class="btn-primary" id="addMatch">Add result</button>
      <button class="btn-ghost" id="undoMatch">Undo last</button>
      <button class="btn-ghost" id="resetAll">Reset season</button>
    </div>
    <div class="status-msg" id="statusMsg"></div>

    <table class="table">
      <thead>
        <tr>
          <th style="width:36px;">Pos</th>
          <th class="team">Team</th>
          <th class="hide-sm">P</th><th>W</th><th>D</th><th>L</th>
          <th class="hide-sm">GF</th><th class="hide-sm">GA</th><th>GD</th><th class="pts">Pts</th>
        </tr>
      </thead>
      <tbody id="table-body"></tbody>
    </table>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";
  import {
    getFirestore, collection, addDoc, onSnapshot, query, orderBy,
    limit, getDocs, deleteDoc, doc, serverTimestamp
  } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyC1RwNxR1cq1snpwA5rWdNWqMcvEJ4WBdo",
    authDomain: "efootball-festival-league.firebaseapp.com",
    databaseURL: "https://efootball-festival-league-default-rtdb.firebaseio.com",
    projectId: "efootball-festival-league",
    storageBucket: "efootball-festival-league.firebasestorage.app",
    messagingSenderId: "978943963528",
    appId: "1:978943963528:web:1b096ef22c9cd83e780a3d"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  const matchesRef = collection(db, "matches");

  const teams = [
    { name: "Arsenal",              color: "#EF0107" },
    { name: "Manchester United",    color: "#DA020E" },
    { name: "AC Milan",             color: "#FB090B" },
    { name: "Paris Saint-Germain",  color: "#3A6ABF" },
    { name: "Liverpool",            color: "#C8102E" },
    { name: "Inter Milan",          color: "#1F63C4" },
    { name: "Barcelona",            color: "#A50044" },
    { name: "Real Madrid",          color: "#F0C869" },
    { name: "Tottenham",            color: "#B8BCC2" },
    { name: "Napoli",               color: "#12A0D7" },
  ];

  let matches = [];

  const loginScreen  = document.getElementById("loginScreen");
  const dashboard    = document.getElementById("dashboard");
  const emailInput   = document.getElementById("adminEmail");
  const passwordInput= document.getElementById("adminPassword");
  const errorMsg     = document.getElementById("errorMsg");
  const statusMsg    = document.getElementById("statusMsg");
  const signedInTag  = document.getElementById("signedInTag");
  const homeSelect   = document.getElementById("homeTeam");
  const awaySelect   = document.getElementById("awayTeam");
  const tbody        = document.getElementById("table-body");

  function populateSelects(){
    [homeSelect, awaySelect].forEach(sel => {
      sel.innerHTML = teams.map(t => `<option value="${t.name}">${t.name}</option>`).join("");
    });
    awaySelect.selectedIndex = 1;
  }

  function initials(name){
    const skip = new Set(["saint-germain"]);
    return name.split(/[\s-]+/).filter(w => !skip.has(w.toLowerCase())).map(w => w[0]).join("").slice(0,3).toUpperCase();
  }

  function computeStandings(){
    const stats = {};
    teams.forEach(t => stats[t.name] = { name: t.name, color: t.color, p:0, w:0, d:0, l:0, gf:0, ga:0 });
    matches.forEach(m => {
      const home = stats[m.home], away = stats[m.away];
      if(!home || !away) return;
      home.p++; away.p++;
      home.gf += m.homeGoals; home.ga += m.awayGoals;
      away.gf += m.awayGoals; away.ga += m.homeGoals;
      if(m.homeGoals > m.awayGoals){ home.w++; away.l++; }
      else if(m.homeGoals < m.awayGoals){ away.w++; home.l++; }
      else { home.d++; away.d++; }
    });
    const arr = teams.map(t => { const s = stats[t.name]; return { ...s, gd: s.gf - s.ga, pts: s.w * 3 + s.d }; });
    arr.sort((a,b) => b.pts - a.pts || b.gd - a.gd || b.gf - a.gf);
    return arr;
  }

  function render(){
    const standings = computeStandings();
    tbody.innerHTML = standings.map((t, i) => {
      const pos = i + 1;
      const gdClass = t.gd > 0 ? "gd-pos" : (t.gd < 0 ? "gd-neg" : "stat-val");
      const gdText = t.gd > 0 ? `+${t.gd}` : `${t.gd}`;
      return `
        <tr>
          <td class="pos-cell">${pos}</td>
          <td class="team"><div class="club"><span class="crest" style="--crest-color:${t.color};">${initials(t.name)}</span><span>${t.name}</span></div></td>
          <td class="hide-sm stat-val">${t.p}</td>
          <td class="stat-val">${t.w}</td>
          <td class="stat-val">${t.d}</td>
          <td class="stat-val">${t.l}</td>
          <td class="hide-sm stat-val">${t.gf}</td>
          <td class="hide-sm stat-val">${t.ga}</td>
          <td class="${gdClass}">${gdText}</td>
          <td class="pts-val">${t.pts}</td>
        </tr>
      `;
    }).join("");
  }

  function showError(msg){ errorMsg.textContent = msg; setTimeout(() => { if(errorMsg.textContent === msg) errorMsg.textContent = ""; }, 3200); }
  function showStatus(msg){ statusMsg.textContent = msg; setTimeout(() => { if(statusMsg.textContent === msg) statusMsg.textContent = ""; }, 2600); }

  onSnapshot(query(matchesRef, orderBy("timestamp", "asc")), (snapshot) => {
    matches = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
    render();
  });

  onAuthStateChanged(auth, (user) => {
    if(user){
      loginScreen.style.display = "none";
      dashboard.classList.add("show");
      signedInTag.textContent = user.email;
    } else {
      loginScreen.style.display = "block";
      dashboard.classList.remove("show");
    }
  });

  document.getElementById("loginBtn").addEventListener("click", async () => {
    const email = emailInput.value.trim();
    const password = passwordInput.value;
    if(!email || !password){ showError("Enter email and password."); return; }
    try{
      await signInWithEmailAndPassword(auth, email, password);
      passwordInput.value = "";
    } catch(err){
      showError("Sign-in failed — check your email and password.");
    }
  });
  passwordInput.addEventListener("keydown", e => { if(e.key === "Enter") document.getElementById("loginBtn").click(); });

  document.getElementById("logoutBtn").addEventListener("click", async () => { await signOut(auth); });

  document.getElementById("addMatch").addEventListener("click", async () => {
    const home = homeSelect.value;
    const away = awaySelect.value;
    const homeGoals = parseInt(document.getElementById("homeGoals").value, 10);
    const awayGoals = parseInt(document.getElementById("awayGoals").value, 10);
    if(home === away){ showStatus("Home and away team must be different."); return; }
    if(isNaN(homeGoals) || isNaN(awayGoals) || homeGoals < 0 || awayGoals < 0){ showStatus("Enter valid scores."); return; }
    try{
      await addDoc(matchesRef, { home, away, homeGoals, awayGoals, timestamp: serverTimestamp() });
      document.getElementById("homeGoals").value = 0;
      document.getElementById("awayGoals").value = 0;
      showStatus("Result added.");
    } catch(err){ showStatus("Could not save — check permissions or connection."); }
  });

  document.getElementById("undoMatch").addEventListener("click", async () => {
    try{
      const q = query(matchesRef, orderBy("timestamp", "desc"), limit(1));
      const snap = await getDocs(q);
      if(snap.empty){ showStatus("No results to undo."); return; }
      await deleteDoc(doc(db, "matches", snap.docs[0].id));
      showStatus("Last result removed.");
    } catch(err){ showStatus("Could not undo — try again."); }
  });

  document.getElementById("resetAll").addEventListener("click", async () => {
    if(!confirm("Reset the whole season? This deletes every logged result.")) return;
    try{
      const snap = await getDocs(matchesRef);
      await Promise.all(snap.docs.map(d => deleteDoc(doc(db, "matches", d.id))));
      showStatus("Season reset.");
    } catch(err){ showStatus("Could not reset — try again."); }
  });

  populateSelects();
</script>

</body>
</html>
